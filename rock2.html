<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    ">Rock</button>

    <button onclick="
      playGame('paper');
    ">Paper</button>

    <button class="pie" onclick="
      playGame('scissors');
    ">Scissors</button>

    <p class="js-r"></p>

    <p class="js-m"></p>

    <p class="js-s"></p>
    <button id="Resets">Reset Score</button>
    <script src="rock.js" defer></script>
  </body>
</html>
